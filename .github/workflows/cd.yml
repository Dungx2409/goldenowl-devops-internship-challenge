name: CD

on:
  push:
    branches:
      - master

jobs:
  test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: src/package-lock.json
        - name: Install deps
          working-directory: ./src
          run: npm ci
        - name: Run tests
          working-directory: ./src
          run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo ">>> Cleaning old Docker images..."
            docker image prune -f --filter "until=24h" || true

            echo ">>> Pulling latest image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest

            echo ">>> Starting new container on port 3001..."
            docker stop goldenowl-app-new || true
            docker rm goldenowl-app-new || true
            docker run -d --name goldenowl-app-new -p 3001:3000 ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest

            echo ">>> Running health check on new container..."
            HEALTHY=false
            for i in $(seq 1 10); do
              sleep 3
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001 || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTHY=true
                echo "Health check passed on attempt $i"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_CODE — retrying in 3s..."
            done

            if [ "$HEALTHY" = false ]; then
              echo ">>> New container failed health check. Rolling back..."
              docker stop goldenowl-app-new
              docker rm goldenowl-app-new
              exit 1
            fi

            echo ">>> Switching traffic to new container..."
            docker stop goldenowl-app || true
            docker rm goldenowl-app || true

            docker run -d --name goldenowl-app -p 3000:3000 --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest

            docker stop goldenowl-app-new || true
            docker rm goldenowl-app-new || true

            echo ">>> Verifying production container..."
            curl -sf http://localhost:3000 || { echo "Production health check failed"; exit 1; }

            echo ">>> Deployment completed successfully!"